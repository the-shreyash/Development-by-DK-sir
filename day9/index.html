<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f5f6fa;
}

.dashboard{
display:flex;
height:100vh;
}

.sidebar{
width:220px;
background:white;
padding:25px;
border-right:1px solid #eee;
}

.sidebar h2{
margin-bottom:30px;
}

.sidebar ul{
list-style:none;
}

.sidebar li{
padding:12px;
border-radius:8px;
cursor:pointer;
margin-bottom:8px;
}

.sidebar li:hover{
background:#f0f2f5;
}

.sidebar .active{
background:#6c63ff;
color:white;
}

.main{
flex:1;
padding:30px;
display:grid;
grid-template-columns:1fr 1fr;
grid-gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 3px 8px rgba(0,0,0,0.05);
}

.card.large{
grid-column:span 2;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #ddd;
}

button{
margin-top:15px;
padding:10px;
width:100%;
background:#6c63ff;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#574bdb;
}

    </style>
</head>
<body>

   

    

<div class="dashboard">

    <aside class="sidebar">
        <h2>💰 Fundwise</h2>

        <ul>
            <li class="active">Overview</li>
            <li>Wallets & Banks</li>
            <li>Activity Log</li>
            <li>Insights</li>
            <li>Spending Plan</li>
            <li>Savings Goals</li>
            <li>Portfolio</li>
        </ul>
    </aside>


    <main class="main">

        <div class="card">
            <h3>Total Budget</h3>
            <p id="salary">$6,400</p>
        </div>

        <div class="card">
            <h3>Spending This Month</h3>
            <p id="expenses">$350</p>
        </div>

        <div class="card large">
            <h3>AI Financial Advice</h3>
            <p id="result">Your AI result will appear here...</p>
        </div>

        <div class="card">
            <h3>Enter Financial Details</h3>

            <input class="userText" placeholder="Salary">
            <input class="userText" placeholder="Expenses">
            <input class="userText" placeholder="Age">
            <input class="userText" placeholder="Risk Appetite">
            <input class="userText" placeholder="Financial Goals">

            <button id="btn" onclick="main()">Ask AI</button>
        </div>

    </main>

</div>


</body>
<script>
    

const API_KEY = "";

const btn = document.getElementById("btn");
const p = document.getElementById("result");
const salaryElement = document.querySelector("#salary");
const expensesElement = document.querySelector("#expenses");
btn.addEventListener("click", main);
    

    async function main() {
        const inputElements = document.querySelectorAll(".userText");
    console.log(inputElements);

    const userText = ` Salary: ${inputElements[0].value} Expenses: ${inputElements[1].value} Age: ${inputElements[2].value} Risk Appetite: ${inputElements[3].value}Financial Goals: ${inputElements[4].value}`;
    console.log(userText);

    const prompt = `You are a fintech AI advisor.User details:${userText} Give:1. Budget advice2. Investment suggestion3. Risk indicator (Low/Medium/High)`;

    p.textContent = "Thinking...";
  const response = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`,
            {
            method:"POST",
            headers:{
            "Content-Type":"application/json"
            },
            body:JSON.stringify({
            contents:[
                {
                parts:[{text:prompt}]
                }
            ]
            })
            }
            );
    

    const data = await response.json();
    console.log(data);

    const output = data.candidates[0].content.parts[0].text;

    result.textContent = output;
    salaryElement.textContent = `${inputElements[0].value}`;
    expensesElement.textContent = `${inputElements[1].value}`;
}


</script>
</html>
