<!DOCTYPE html>
<html>
<head>
<style>
body.dark-mode {
  background-color: black;
}

.white-text {
  color: white;
}
</style>
</head>

<body>

<h1 id="heading">Welcome to My Website</h1>

<button onclick="changeColor()">Dark Mode</button>

<script>
function changeColor() {
  document.body.classList.toggle("dark-mode");
  document.getElementById("heading").classList.toggle("white-text");
}
</script>

</body>
</html>
